apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trident-protect-wordpress2-app-definition
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://192.168.0.65:3000/demo/wordpress'
    path: Wordpress_DR/App_definition
    targetRevision: master
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: wpargo2
  ignoreDifferences:
    - group: "protect.trident.netapp.io"
      kind: Application
  syncPolicy:
    automated: {}
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true