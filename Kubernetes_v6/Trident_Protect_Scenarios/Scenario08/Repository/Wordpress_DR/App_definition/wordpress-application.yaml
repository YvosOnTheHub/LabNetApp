apiVersion: protect.trident.netapp.io/v1
kind: Application
metadata:
  name: wordpress
  namespace: wpargo2
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  includedNamespaces:
    - namespace: wpargo2
  resourceFilter:
    resourceMatchers:
    - kind: PersistentVolumeClaim
      version: v1
    - kind: Pod
      version: v1
    resourceSelectionCriteria: Include