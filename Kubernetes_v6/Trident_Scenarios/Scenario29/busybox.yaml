apiVersion: v1
kind: Namespace
metadata:
  name: busybox-tap
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mydata
  namespace: busybox-tap
  annotations:
    trident.netapp.io/autogrowPolicy: demo-autogrow
  labels:
    app.kubernetes.io/name: scenario29
    app: busybox
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: storage-class-nfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox
  namespace: busybox-tap
  labels:
    app.kubernetes.io/name: scenario29
    app: busybox
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scenario29
      app: busybox
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scenario29
        app: busybox
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: busybox
        image: registry.demo.netapp.com/busybox:1.35.0
        imagePullPolicy: IfNotPresent
        command: ['sleep', '3600']        
        volumeMounts:
        - mountPath: /data
          name: volume
      volumes:
      - name: volume
        persistentVolumeClaim:
          claimName: mydata
