- hosts: localhost
  collections:
    - netapp.ontap

  tasks: 
  - name: Create vserver peer NASSVM
    netapp.ontap.na_ontap_vserver_peer:
      state: present
      peer_vserver: svm_secondary
      peer_cluster: "cluster1"
      vserver: nassvm
      applications: ['snapmirror']
      hostname: "cluster1"
      username: "admin"
      password: "Netapp1!"
      https: true
      validate_certs: false

  - name: Create vserver peer SANSVM
    netapp.ontap.na_ontap_vserver_peer:
      state: present
      peer_vserver: svm_secondary
      peer_cluster: "cluster1"
      vserver: sansvm
      applications: ['snapmirror']
      hostname: "cluster1"
      username: "admin"
      password: "Netapp1!"
      https: true
      validate_certs: false